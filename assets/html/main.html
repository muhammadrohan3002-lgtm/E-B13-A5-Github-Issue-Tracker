<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
</head>
<body class="bg-gray-100">

<!-- Navbar -->
<nav class="bg-white shadow p-4 flex justify-between items-center">
    <div class="flex items-center space-x-2">
        <img src="../github-logo.png" alt="Logo" class="w-8 h-8">
        <span class="font-bold text-lg">GitHub Issues Tracker</span>
    </div>
    <div class="flex items-center space-x-2">
        <input id="search" type="text" placeholder="Search issues..." class="border p-2 rounded">
        <button onclick="searchIssue()" class="bg-purple-700 text-white px-4 py-2 rounded">Search</button>
        <button class="bg-purple-700 text-white px-4 py-2 rounded">+ New Issue</button>
    </div>
</nav>

<!-- Tabs -->
<div class="flex justify-start space-x-2 bg-white p-4 mt-2">
    <button onclick="filterIssues('all')" id="tab-all" class="bg-purple-700 text-white px-4 py-2 rounded">All</button>
    <button onclick="filterIssues('open')" id="tab-open" class="bg-gray-200 text-gray-700 px-4 py-2 rounded">Open</button>
    <button onclick="filterIssues('closed')" id="tab-closed" class="bg-gray-200 text-gray-700 px-4 py-2 rounded">Closed</button>
</div>

<!-- Issue Count -->
<div class="flex justify-between p-4 bg-white mt-2">
    <div>
        <p id="issue-count" class="font-bold text-lg">0 Issues</p>
        <p class="text-gray-500">Track and manage your project issues</p>
    </div>
    <div class="flex space-x-2 items-center">
        <span class="text-green-500">● Open</span>
        <span class="text-purple-700">● Closed</span>
    </div>
</div>

<!-- Issues Grid -->
<div id="issues-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 p-4">
    <!-- Issues will be loaded here via JS -->
</div>

<!-- Modal -->
<div id="issue-modal" class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center hidden">
    <div class="bg-white p-6 rounded w-full max-w-md relative">
        <button onclick="closeModal()" class="absolute top-2 right-2 text-gray-500">&times;</button>
        <div id="modal-content"></div>
    </div>
</div>
 <script src="https://cdn.tailwindcss.com"></script>

<script src="../script.js"></script>

</body>
</html>
