<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Login</title>
</head>
<body class="bg-gray-100 flex justify-center items-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <div class="flex flex-col items-center mb-6">
            <img src="../github-logo.png" alt="GitHub Logo" class="w-20 h-20 mb-2">
            <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
            <p class="text-gray-500">Sign in to manage your issues</p>
        </div>

        <div>
            <label class="block font-semibold">Username</label>
            <input id="username" type="text" placeholder="Enter Username" class="w-full border p-2 rounded mb-2">
            <p class="text-purple-700 text-sm mb-2">Default: admin</p>

            <label class="block font-semibold">Password</label>
            <input id="password" type="password" placeholder="Enter Password" class="w-full border p-2 rounded mb-2">
            <p class="text-purple-700 text-sm mb-4">Default: admin123</p>

            <button onclick="login()" class="w-full bg-purple-700 text-white p-2 rounded hover:bg-purple-800">Sign In</button>

            <div class="text-center my-4">OR</div>

            <div class="bg-gray-100 p-4 rounded text-center">
                <p class="font-semibold">Demo Credentials:</p>
                <p>Username: <strong>admin</strong></p>
                <p>Password: <strong>admin123</strong></p>
            </div>
        </div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="../script.js"></script>
</body>
</html>
